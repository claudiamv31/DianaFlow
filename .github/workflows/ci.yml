name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test -- --watchAll=false --watchman=false
        env:
          CI: true
      - run: npm run build
        env:
          CI: true

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore backend.Tests/backend.Tests.csproj
      - name: Lint backend
        run: |
          dotnet format analyzers backend/backend.csproj --no-restore --verify-no-changes --severity warn
          dotnet format analyzers backend.Tests/backend.Tests.csproj --no-restore --verify-no-changes --severity warn
      - run: dotnet build backend/backend.csproj --no-restore
      - run: dotnet test backend.Tests/backend.Tests.csproj --no-restore
